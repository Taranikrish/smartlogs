services:
  prometheus:
    image: prom/prometheus:latest
    container_name: Smartlogs-prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./smartlog-prom/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./smartlog-prom/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=${RETENTION_TIME}'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: Smartlogs-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-Smartlogs}
    volumes:
      - ./smartlog-grafana/provisioning:/etc/grafana/provisioning
      - ./smartlog-grafana/prom-dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus