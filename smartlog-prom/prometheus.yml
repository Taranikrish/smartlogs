global:
  scrape_interval: 15s      # scrape every 15 seconds
  evaluation_interval: 15s  # evaluate alert rules every 15 seconds

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'Smartlogs-app'
    static_configs:
      - targets: ['host.docker.internal:5000']
        # host.docker.internal lets Docker reach your app running on your machine
        # if on Linux, replace with: 172.17.0.1:5000